services:
  broker:
    image: "rabbitmq:3-management"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686" # UI
      - "6831:6831/udp" # Envio dos Traces (temporizadores)
      - "14268:14268" # Entrada de Traces (HTTP)
      - "4317:4317" # Open Telemetry (OTLP/gRPC)
      - "4318:4318" # Open Telemetry (OTLP/HTTP)

  api-gateway:
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_ADMIN_LISTEN: '0.0.0.0:8001'
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_DECLARATIVE_CONFIG: '/kong/config.yaml'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - './docker/kong/config.yaml:/kong/config.yaml'
    ports:
      - "8000:8000" # Proxy
      - "8001:8001" # Admin API
      - "8002:8002" # Admin UI
      - "8443:8443" # Proxy SSL (HTTPS)
      - "8444:8444" # Admin API HTTPS

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  rabbitmq_data:
  pg_data: