name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: docker
          POSTGRES_PASSWORD: docker
          POSTGRES_DB: orders
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies (Orders)
        working-directory: ./app-orders
        run: npm ci

      - name: Run Migrations (Orders)
        working-directory: ./app-orders
        run: npx drizzle-kit push
        env:
          DATABASE_URL: postgres://docker:docker@localhost:5432/orders

      - name: Run Tests (Orders)
        working-directory: ./app-orders
        run: npm run test
        env:
          DATABASE_URL: postgres://docker:docker@localhost:5432/orders

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Orders Image
        uses: docker/build-push-action@v5
        with:
          context: ./app-orders
          file: ./app-orders/Dockerfile
          push: false
          tags: orders-service:latest

      - name: Build Invoices Image
        uses: docker/build-push-action@v5
        with:
          context: ./app-invoices
          file: ./app-invoices/Dockerfile
          push: false
          tags: invoices-service:latest
